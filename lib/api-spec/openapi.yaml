      properties:
        id: { type: string }
        name: { type: string }
        workCenterType: { type: string }
        capacity: { type: integer }
        areaName: { type: string }
        areaType: { type: string }
        siteName: { type: string }
        twinState: { type: string }
        activeCount: { type: integer }
        utilisationPct: { type: integer }
        byStatus:
          type: object
          additionalProperties: { type: integer }

    SegmentSummary:
      type: object
      required: [id, engineId, sequenceNumber, segmentStatus, updatedAt]
      properties:
        id: { type: string }
