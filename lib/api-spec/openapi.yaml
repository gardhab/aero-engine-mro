        sourceWorkPackageId: { type: ["string", "null"] }
        sourceRecommendationId: { type: ["string", "null"] }
        requestedStartTime: { type: ["string", "null"] }
        requestedEndTime: { type: ["string", "null"] }
        status: { type: string }
        twinState: { type: string }
        createdAt: { type: string }
        updatedAt: { type: string }

    OperationSegmentRecord:
      type: object
