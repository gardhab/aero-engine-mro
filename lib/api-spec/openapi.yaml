        estimatedHours: { type: number }
        status:
          $ref: "#/components/schemas/WorkPackageTaskStatus"
        blockedByTcn:
          type: ["string", "null"]
          description: TCN of the earlier incomplete task this one waits on
        blocksDownstream:
          type: boolean
          description: True when this incomplete task holds up later tasks
        startedAt: { type: ["string", "null"] }
        completedAt: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }

    WorkPackage:
      type: object
      required:
        [
          id,
          recommendationId,
          engineId,
          failureMode,
          component,
          status,
          taskCount,
          completedTaskCount,
          createdAt,
          tasks,
        ]
      properties:
        id: { type: string }
        recommendationId: { type: string }
        engineId: { type: string }
        failureMode: { type: string }
        component: { type: string }
        status:
          type: string
          enum: [not_started, in_progress, complete]
        taskCount: { type: integer }
        completedTaskCount: { type: integer }
        createdAt: { type: string }
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/WorkPackageTask"

    UpdateWorkPackageTaskStatusInput:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/WorkPackageTaskStatus"
        updatedBy:
          type: string

    TatKpis:
      type: object
      required: [wipCount]
      properties:
        avgTatDays: { type: ["number", "null"] }
        queueTimePctOfTat: { type: ["number", "null"] }
        scheduleAdherencePct: { type: ["number", "null"] }
        partsAvailabilityPct: { type: ["number", "null"] }
        wipCount: { type: integer }
        onTimeDeliveryPct: { type: ["number", "null"] }

    EngineFlowRow:
      type: object
      required:
        [
          engineId,
          workPackageId,
          recommendationId,
          failureMode,
          timeInOperationHours,
          queueTimeHours,
          valueAddedHours,
          elapsedDays,
          criticalPathTcns,
          complete,
        ]
      properties:
        engineId: { type: string }
        workPackageId: { type: string }
        recommendationId: { type: string }
        failureMode: { type: string }
        currentTcn: { type: ["string", "null"] }
        currentOperation: { type: ["string", "null"] }
        currentStatus: { type: ["string", "null"] }
        timeInOperationHours: { type: number }
        queueTimeHours: { type: number }
        valueAddedHours: { type: number }
        elapsedDays: { type: number }
        predictedCompletion: { type: ["string", "null"] }
        plannedCompletion: { type: ["string", "null"] }
        criticalPathTcns:
          type: array
          items: { type: string }
        onSchedule: { type: ["boolean", "null"] }
        complete: { type: boolean }

    BottleneckAlert:
      type: object
      required:
        [tcn, engineId, workPackageId, status, description, waitHours, blockedTcns]
      properties:
        tcn: { type: string }
        engineId: { type: string }
        workPackageId: { type: string }
        status: { type: string }
        description: { type: string }
        waitHours: { type: number }
        blockedTcns:
          type: array
          items: { type: string }

    ProductionControl:
      type: object
      required: [asOf, kpis, engines, bottlenecks]
      properties:
        asOf: { type: string }
        kpis:
          $ref: "#/components/schemas/TatKpis"
        engines:
          type: array
          items:
            $ref: "#/components/schemas/EngineFlowRow"
        bottlenecks:
          type: array
          items:
            $ref: "#/components/schemas/BottleneckAlert"

