openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: >-
    Aircraft Engine MRO Decision Support API. Ingests engine condition data,
    reasons over it with a domain ontology, knowledge graph and rules engine,
    and produces traceable MRO Work Recommendations for human planners and for
    SAP S/4HANA Cloud (mock mode).
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: operations
    description: ISA-95 equipment hierarchy and work centre management
  - name: execution
    description: ISA-95 operations requests and execution segments
  - name: dashboard
    description: Fleet overview and activity
  - name: engines
    description: Monitored engines and sensor readings
  - name: recommendations
    description: MRO Work Recommendations and review workflow
  - name: rules
    description: Data-driven ECTM rules
  - name: ontology
    description: SME-editable domain ontology
  - name: graph
    description: Knowledge graph explorer
  - name: sap
    description: SAP S/4HANA Cloud adapter (mock mode)
  - name: backtest
    description: Historical replay and evaluation

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Fleet health summary
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/activity:
    get:
      operationId: getActivity
      tags: [dashboard]
      summary: Recent activity feed
      responses:
        "200":
          description: Activity events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEvent"

  /engines:
    get:
      operationId: listEngines
      tags: [engines]
      summary: List monitored engines
      responses:
        "200":
          description: Engines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Engine"

  /engines/{esn}:
    get:
      operationId: getEngine
      tags: [engines]
      summary: Get one engine
      parameters:
        - $ref: "#/components/parameters/EsnParam"
      responses:
        "200":
          description: Engine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Engine"
        "404":
          $ref: "#/components/responses/NotFound"

  /engines/{esn}/health:
    get:
      operationId: getEngineHealth
      tags: [engines]
      summary: Get engine parameter health
      parameters:
        - $ref: "#/components/parameters/EsnParam"
      responses:
        "200":
          description: Engine health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngineHealth"
        "404":
          $ref: "#/components/responses/NotFound"

  /engines/{esn}/llps:
    get:
      operationId: getEngineLlps
      tags: [engines]
      summary: Get the engine's life-limited part (LLP) status sheet
      parameters:
        - $ref: "#/components/parameters/EsnParam"
      responses:
        "200":
          description: LLP status sheet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngineLlpSheet"
        "404":
          $ref: "#/components/responses/NotFound"

  /llps/summary:
    get:
      operationId: getFleetLlpSummary
      tags: [engines]
      summary: Fleet-level LLP summary (limiting part per engine)
      responses:
        "200":
          description: Fleet LLP summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FleetLlpSummaryItem"

  /readings:
    get:
      operationId: getEngineReadings
      tags: [engines]
      summary: Get engine sensor readings (time series)
      parameters:
        - name: engineId
          in: query
          required: true
          schema:
            type: string
          description: Engine serial number (ESN)
        - name: parameter
          in: query
          required: false
          schema:
            type: string
          description: Filter by ECTM parameter code (e.g. EGT_MARGIN)
      responses:
        "200":
          description: Readings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ParameterReading"

  /recommendations:
    get:
      operationId: listRecommendations
      tags: [recommendations]
      summary: List MRO Work Recommendations
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RecommendationStatus"
        - name: engineId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Recommendations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recommendation"

  /recommendations/{id}:
    get:
      operationId: getRecommendation
      tags: [recommendations]
      summary: Get one recommendation with full traceability
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Recommendation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recommendation"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateRecommendation
      tags: [recommendations]
      summary: Edit a recommendation
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommendationUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recommendation"
        "404":
          $ref: "#/components/responses/NotFound"

  /recommendations/{id}/approve:
    post:
      operationId: approveRecommendation
      tags: [recommendations]
      summary: Approve a recommendation
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recommendation"
        "404":
          $ref: "#/components/responses/NotFound"

  /recommendations/{id}/reject:
    post:
      operationId: rejectRecommendation
      tags: [recommendations]
      summary: Reject a recommendation
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recommendation"
        "404":
          $ref: "#/components/responses/NotFound"

  /recommendations/{id}/push-to-sap:
    post:
      operationId: pushRecommendationToSap
      tags: [recommendations, sap]
      summary: Push an approved recommendation to SAP as a Maintenance Notification
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: SAP notification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SapNotification"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /recommendations/{id}/dispatch:
    post:
      operationId: dispatchRecommendation
      tags: [recommendations, exchange]
      summary: Dispatch an approved recommendation to an MRO shop as an Engine Service Request (TSR)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: The created shop-visit exchange
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShopVisitExchange"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /recommendations/{id}/exchange:
    get:
      operationId: getRecommendationExchange
      tags: [recommendations, exchange]
      summary: Get the shop-visit exchange for a recommendation, if one exists
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: The shop-visit exchange
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShopVisitExchange"
        "404":
          $ref: "#/components/responses/NotFound"

  /exchanges:
    get:
      operationId: listExchanges
      tags: [exchange]
      summary: List shop-visit exchanges
      responses:
        "200":
          description: Shop-visit exchanges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShopVisitExchangeSummary"

  /exchanges/{id}:
    get:
      operationId: getExchange
      tags: [exchange]
      summary: Get one shop-visit exchange with full TSR and acknowledgement
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: The shop-visit exchange
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShopVisitExchange"
        "404":
          $ref: "#/components/responses/NotFound"

  /exchanges/{id}/acknowledgement:
    post:
      operationId: ingestAcknowledgement
      tags: [exchange]
      summary: Ingest and validate an MRO Induction Acceptance (JSON or XML)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestAcknowledgementInput"
      responses:
        "200":
          description: The updated shop-visit exchange
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShopVisitExchange"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /exchanges/{id}/advance:
    post:
      operationId: advanceExchange
      tags: [exchange]
      summary: Advance the shop-visit exchange lifecycle to the next status
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdvanceExchangeInput"
      responses:
        "200":
          description: The updated shop-visit exchange
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShopVisitExchange"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /work-packages:
    get:
      operationId: listWorkPackages
      tags: [work-packages]
      summary: List TCN-tracked shop-visit work packages
      parameters:
        - name: engineId
          in: query
          required: false
          schema:
            type: string
        - name: recommendationId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Work packages with their TCN-numbered tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkPackage"

  /work-package-tasks/{id}/status:
    post:
      operationId: updateWorkPackageTaskStatus
      tags: [work-packages]
      summary: Update the execution status of a TCN-tracked task
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkPackageTaskStatusInput"
      responses:
        "200":
          description: The task's updated work package
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkPackage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /production-control:
    get:
      operationId: getProductionControl
      tags: [work-packages]
      summary: TAT & production-control view computed from TCN work-package data
      responses:
        "200":
          description: KPI set, engine flow board and bottleneck TCNs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductionControl"

  /work-centres:
    get:
      operationId: listWorkCentres
      tags: [operations]
      summary: List all ISA-95 work centres with utilisation summary
      responses:
        "200":
          description: Work centres with current segment counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkCentreWithContext"

  /work-centres/{id}/utilisation:
    get:
      operationId: getWorkCentreUtilisation
      tags: [operations]
      summary: Detailed utilisation for one work centre
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Work centre utilisation detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkCentreUtilisation"
        "404":
          description: Work centre not found

  /operations-requests:
    post:
      operationId: createOperationsRequest
      tags: [execution]
      summary: Create an ISA-95 operations request (work order twin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOperationsRequestInput"
      responses:
        "201":
          description: Created operations request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationsRequestRecord"

  /operations-requests/{id}/segments:
    get:
      operationId: getOperationSegments
      tags: [execution]
      summary: List operation segments for an operations request
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: List of operation segments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OperationSegmentRecord"

  /pipeline/run:
    post:
      operationId: runPipeline
      tags: [recommendations]
      summary: Run the decision pipeline over current engine data
      responses:
        "200":
          description: Pipeline result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineResult"

  /rules:
    get:
      operationId: listRules
      tags: [rules]
      summary: List ECTM rules
      responses:
        "200":
          description: Rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rule"

  /rules/{id}:
    get:
      operationId: getRule
      tags: [rules]
      summary: Get one rule
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rule"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateRule
      tags: [rules]
      summary: Edit a rule (thresholds, cycles, enable/disable)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rule"
        "404":
          $ref: "#/components/responses/NotFound"

  /ontology:
    get:
      operationId: getOntology
      tags: [ontology]
      summary: Get the published ontology
      responses:
        "200":
          description: Ontology
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ontology"

  /ontology/draft:
    get:
      operationId: getOntologyDraft
      tags: [ontology]
      summary: Get the working draft ontology
      responses:
        "200":
          description: Draft ontology
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ontology"

  /ontology/turtle:
    get:
      operationId: getOntologyTurtle
      tags: [ontology]
      summary: Get the canonical Turtle serialization
      responses:
        "200":
          description: Turtle text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OntologyTurtle"

  /ontology/versions:
    get:
      operationId: listOntologyVersions
      tags: [ontology]
      summary: List ontology versions
      responses:
        "200":
          description: Versions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OntologyVersion"

  /ontology/classes:
    post:
      operationId: createOntologyClass
      tags: [ontology]
      summary: Add a class to the draft ontology
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OntologyClassInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OntologyClass"
        "400":
          $ref: "#/components/responses/BadRequest"

  /ontology/classes/{id}:
    patch:
      operationId: updateOntologyClass
      tags: [ontology]
      summary: Edit or deprecate a class in the draft ontology
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OntologyClassUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OntologyClass"
        "404":
          $ref: "#/components/responses/NotFound"

  /ontology/relationships:
    post:
      operationId: createOntologyRelationship
      tags: [ontology]
      summary: Add a relationship to the draft ontology
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OntologyRelationshipInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OntologyRelationship"
        "400":
          $ref: "#/components/responses/BadRequest"

  /ontology/relationships/{id}:
    patch:
      operationId: updateOntologyRelationship
      tags: [ontology]
      summary: Update a draft ontology relationship (name, multiplicities, description)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OntologyRelationshipUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OntologyRelationship"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /ontology/validate:
    post:
      operationId: validateOntology
      tags: [ontology]
      summary: Validate the draft ontology (conformance + impact analysis)
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OntologyValidationResult"

  /ontology/publish:
    post:
      operationId: publishOntology
      tags: [ontology]
      summary: Validate and publish the draft ontology as a new version
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OntologyPublishInput"
      responses:
        "200":
          description: Published version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OntologyVersion"
        "400":
          $ref: "#/components/responses/BadRequest"

  /graph:
    get:
      operationId: getGraph
      tags: [graph]
      summary: Get knowledge-graph nodes and edges
      parameters:
        - name: engineId
          in: query
          required: false
          schema:
            type: string
          description: Scope the graph to one engine's subgraph
        - name: type
          in: query
          required: false
          schema:
            type: string
          description: Filter nodes by class/type
      responses:
        "200":
          description: Graph
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphData"

  /graph/nodes/{id}:
    get:
      operationId: getGraphNode
      tags: [graph]
      summary: Get one graph node
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphNode"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateGraphNode
      tags: [graph]
      summary: Correct an instance node (validated against the ontology)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GraphNodeUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphNode"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /sap/status:
    get:
      operationId: getSapStatus
      tags: [sap]
      summary: Get SAP adapter status (mock/live, configuration presence)
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SapStatus"

  /sap/notifications:
    get:
      operationId: listSapNotifications
      tags: [sap]
      summary: List SAP notification attempts (success + manual-review queue)
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SapNotification"

  /backtest/runs:
    get:
      operationId: listBacktestRuns
      tags: [backtest]
      summary: List backtest runs
      responses:
        "200":
          description: Runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BacktestRun"

  /backtest/runs/{id}:
    get:
      operationId: getBacktestRun
      tags: [backtest]
      summary: Get a backtest run with per-cycle detail
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestRun"
        "404":
          $ref: "#/components/responses/NotFound"

  /backtest/run:
    post:
      operationId: runBacktest
      tags: [backtest]
      summary: Replay historical data through the pipeline and evaluate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BacktestInput"
      responses:
        "200":
          description: Completed run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestRun"

components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
    EsnParam:
      name: esn
      in: path
      required: true
      schema:
        type: string

  responses:
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Conflict with current state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ValidationFailed:
      description: Document validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationError"

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    DocumentIssue:
      type: object
      required: [field, message]
      properties:
        field: { type: string }
        message: { type: string }

    ValidationError:
      type: object
      required: [error]
      properties:
