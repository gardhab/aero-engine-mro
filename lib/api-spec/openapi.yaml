        name: { type: string }
        capacity: { type: integer }
        activeCount: { type: integer }
        utilisationPct: { type: integer }
        byStatus:
          type: object
          additionalProperties: { type: integer }
        segments:
          type: array
          items:
            $ref: "#/components/schemas/SegmentSummary"

