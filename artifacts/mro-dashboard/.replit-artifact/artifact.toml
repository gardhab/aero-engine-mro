kind = "web"
previewPath = "/"
title = "Aero Engine MRO Decision Support"
version = "1.0.0"
id = "artifacts/mro-dashboard"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24394

[services.development]
run = "pnpm --filter @workspace/mro-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mro-dashboard", "run", "build" ]
serve = "static"
publicDir = "artifacts/mro-dashboard/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24394"
BASE_PATH = "/"
